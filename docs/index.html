<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🚀 업비트 자동매매 봇 v1.1.6</title>
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="업비트 자동매매 봇">
<style>
html { overscroll-behavior-y: contain; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 12px; max-width: 600px; margin: 0 auto; }
.hdr { display: flex; justify-content: space-between; align-items: center; padding: 8px 0 16px; }
.hdr h1 { font-size: 17px; color: #58a6ff; }
.hdr .tm { font-size: 11px; color: #484f58; }
.dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
.dot-on { background: #3fb950; box-shadow: 0 0 6px #3fb950; }
.dot-off { background: #f85149; }
.g { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.c { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px; }
.c.wide { grid-column: 1 / -1; }
.c .lb { font-size: 11px; color: #484f58; }
.c .v { font-size: 22px; font-weight: 700; margin: 2px 0; }
.c .s { font-size: 11px; color: #484f58; }
.p { color: #f85149; } .m { color: #3b82f6; } .z { color: #484f58; }
.sec { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
.sec h2 { font-size: 13px; color: #58a6ff; margin-bottom: 8px; cursor: pointer; }
.sec h2::after { content: ' ▾'; font-size: 10px; }
table { width: 100%; border-collapse: collapse; font-size: 11px; }
th { text-align: left; color: #484f58; font-weight: 500; padding: 3px 4px; border-bottom: 1px solid #30363d; white-space: nowrap; }
td { padding: 4px 4px; border-bottom: 1px solid #1c2028; white-space: nowrap; }
.tg { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 10px; font-weight: 600; }
.tw { background: #3d1419; color: #f85149; }
.tl { background: #1e2a4a; color: #3b82f6; }
.td { background: #272c33; color: #484f58; }
.ts { background: #1c2541; color: #79c0ff; }
.tb { background: #272c33; color: #d2a8ff; }
.bar { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; font-size: 11px; cursor: pointer; padding: 2px 0; border-radius: 4px; }
.bar:active { background: #1c2028; }
.bar .d { min-width: 46px; font-size: 13px; font-weight: 600; color: #8b949e; }
.bar .bw { flex: 1; height: 16px; background: #1c2028; border-radius: 3px; overflow: hidden; }
.bar .b { height: 100%; border-radius: 3px; min-width: 2px; transition: width .3s; }
.bp { background: #da3633; } .bm { background: #3b82f6; }
.bar .pn { min-width: 75px; text-align: right; font-weight: 600; }
.day-detail { background: #1c2028; border-radius: 6px; padding: 8px 10px; margin: 2px 0 6px; font-size: 11px; display: none; }
.day-detail.open { display: block; }
.day-detail .row { display: flex; justify-content: space-between; padding: 2px 0; }
.day-detail .row .lbl { color: #484f58; }
.more-btn { text-align: center; padding: 8px; color: #58a6ff; font-size: 12px; cursor: pointer; border-top: 1px solid #1c2028; margin-top: 4px; }
.more-btn:active { color: #79c0ff; }
.month-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; font-size: 12px; }
.month-bar .d { min-width: 36px; font-size: 13px; font-weight: 700; color: #8b949e; }
.month-bar .bw { flex: 1; height: 20px; background: #1c2028; border-radius: 3px; overflow: hidden; }
.month-bar .b { height: 100%; border-radius: 3px; min-width: 2px; }
.month-bar .pn { min-width: 80px; text-align: right; font-weight: 600; }
.month-bar .info { font-size: 10px; color: #484f58; min-width: 60px; text-align: right; }
.pos { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #1c2028; }
.pos:last-child { border-bottom: none; }
.pos .cn { font-weight: 700; font-size: 14px; }
.pos .dt { font-size: 11px; color: #484f58; }
.pos .pr { font-size: 15px; font-weight: 700; }
.changelog { max-height: 200px; overflow-y: auto; }
.cl-item { padding: 6px 0; border-bottom: 1px solid #1c2028; font-size: 12px; }
.cl-item .cl-time { color: #484f58; font-size: 10px; }
.cl-item .cl-desc { margin-top: 2px; }
.cl-tag { font-size: 10px; padding: 1px 4px; border-radius: 3px; background: #1f3a5f; color: #58a6ff; }
.err { text-align: center; padding: 40px; color: #484f58; }
.loading { text-align: center; padding: 40px; color: #484f58; }
.menu-btn { font-size: 18px; cursor: pointer; padding: 4px 8px; color: #484f58; -webkit-tap-highlight-color: transparent; }
.menu-btn:active { color: #58a6ff; }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200; }
.overlay.open { display: block; }
.panel { position: fixed; top: 0; right: -280px; width: 280px; height: 100%; background: #161b22; border-left: 1px solid #30363d; z-index: 201; transition: right .25s ease; overflow-y: auto; padding: 16px; }
.panel.open { right: 0; }
.panel h3 { font-size: 14px; color: #58a6ff; margin-bottom: 12px; }
.panel .close { position: absolute; top: 12px; right: 12px; font-size: 18px; color: #484f58; cursor: pointer; padding: 4px; }
.chat-wrap { border-top: 1px solid #30363d; margin-top: 16px; padding-top: 12px; display: flex; flex-direction: column; flex: 1; }
.chat-wrap h3 { margin-bottom: 8px; }
.chat-log { flex: 1; overflow-y: auto; max-height: 300px; padding: 4px 0; }
.bubble { max-width: 85%; padding: 8px 12px; border-radius: 12px; font-size: 12px; line-height: 1.4; margin-bottom: 6px; word-break: break-word; }
.bubble.me { background: #238636; color: #fff; margin-left: auto; border-bottom-right-radius: 4px; }
.bubble.bot { background: #30363d; color: #c9d1d9; margin-right: auto; border-bottom-left-radius: 4px; }
.bubble .btime { font-size: 9px; opacity: .5; margin-top: 3px; }
.bubble .bstatus { font-size: 9px; opacity: .6; margin-top: 2px; }
.chat-bar { display: flex; gap: 6px; margin-top: 8px; }
.chat-bar input { flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 18px; padding: 8px 14px; color: #c9d1d9; font-size: 13px; outline: none; }
.chat-bar input:focus { border-color: #58a6ff; }
.chat-bar button { background: #238636; border: none; color: #fff; width: 36px; height: 36px; border-radius: 50%; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.chat-bar button:active { background: #2ea043; }
.chat-setup { font-size: 11px; color: #484f58; margin-top: 8px; }
.chat-setup input { width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 4px; padding: 6px 8px; color: #c9d1d9; font-size: 11px; margin-top: 4px; outline: none; }
.chat-setup button { background: #30363d; border: none; color: #c9d1d9; padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; margin-top: 4px; }
.mkt { display: flex; align-items: center; gap: 10px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; }
.mkt .badge { font-size: 13px; font-weight: 700; padding: 3px 10px; border-radius: 6px; }
.mkt .info { flex: 1; font-size: 11px; color: #8b949e; }
.mkt .coins { font-size: 11px; }
</style>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
<div class="hdr">
  <h1><span class="dot" id="dot"></span>🚀 업비트 자동매매 봇 <span id="ver" style="font-size:11px;color:#484f58;font-weight:400;cursor:pointer;padding:4px 8px;border-radius:4px;-webkit-tap-highlight-color:transparent">v1.1.6</span></h1>
  <div><span class="tm" id="tm"></span> <span class="menu-btn" onclick="toggleMenu()">☰</span></div>
</div>
<div id="overlay" class="overlay" onclick="toggleMenu()"></div>
<div id="menuPanel" class="panel">
  <span class="close" onclick="toggleMenu()">✕</span>
  <h3>AutoTune 개선 로그</h3>
  <div id="logList"></div>
  <div class="chat-wrap">
    <h3>💬 채팅</h3>
    <div id="chatArea">
      <div class="chat-log" id="chatLog"></div>
      <div class="chat-bar">
        <input id="chatMsg" placeholder="메시지 입력..." onkeydown="if(event.key==='Enter')sendChat()">
        <button onclick="sendChat()">↑</button>
      </div>
    </div>
    <div id="chatSetup" style="display:none" class="chat-setup">
      <div>텔레그램 봇 토큰</div>
      <input id="tgToken" placeholder="123456:ABC...">
      <div style="margin-top:4px">Chat ID</div>
      <input id="tgChatId" placeholder="8440882806">
      <button onclick="saveTgConfig()" style="margin-top:6px">저장</button>
    </div>
  </div>
</div>
<div id="app"><div class="loading">로딩 중...</div></div>

<script>
const DATA_URL = 'status.json';
const fmt = n => n.toLocaleString('ko-KR');
const pc = n => n > 0 ? 'p' : n < 0 ? 'm' : 'z';
const ps = n => (n > 0 ? '+' : '') + fmt(n);

async function load() {
  try {
    const r = await fetch(DATA_URL + '?t=' + Date.now());
    if (!r.ok) throw new Error('fetch failed');
    const d = await r.json();
    render(d);
  } catch(e) {
    document.getElementById('dot').className = 'dot dot-off';
    document.getElementById('app').innerHTML = '<div class="err">데이터 로드 실패<br><small>status.json 확인</small></div>';
  }
}

function render(d) {
  document.getElementById('dot').className = 'dot ' + (d.bot_running ? 'dot-on' : 'dot-off');
  document.getElementById('tm').textContent = d.updated;

  const pnlPct = ((d.balance - 10000000) / 100000).toFixed(2);
  const maxBar = Math.max(...d.daily.map(x => Math.abs(x.pnl)), 1);

  // Market index
  const m = d.market || {};
  let html = '';
  if (m.grade) {
    html += `<div class="mkt">
      <span class="badge" style="background:${m.color}22;color:${m.color}">${m.grade}</span>
      <span class="info">${m.detail || ''}</span>
      <span class="coins">BTC <span class="${pc(m.btc_chg)}">${m.btc_chg>=0?'+':''}${m.btc_chg}%</span> · ALT <span class="${pc(m.alt_chg)}">${m.alt_chg>=0?'+':''}${m.alt_chg}%</span></span>
    </div>`;
  }

  html += `
  <div class="g">
    <div class="c">
      <div class="lb">잔고</div>
      <div class="v">${fmt(Math.round(d.balance))}</div>
      <div class="s ${pc(d.total_pnl)}">${ps(Math.round(d.total_pnl))}원 (${d.total_pnl>=0?'+':''}${pnlPct}%)</div>
    </div>
    <div class="c">
      <div class="lb">승률</div>
      <div class="v ${d.win_rate>=40?'p':d.win_rate>=30?'z':'m'}">${d.win_rate.toFixed(1)}%</div>
      <div class="s">${d.wins}승 ${d.losses}패 ${d.draws}무 (${d.total_trades}건)</div>
    </div>
    <div class="c">
      <div class="lb">오늘</div>
      <div class="v ${pc(d.today_pnl)}">${ps(Math.round(d.today_pnl))}</div>
      <div class="s">${d.today_trades}건 | 승률 ${d.today_wr.toFixed(0)}%</div>
    </div>
    <div class="c">
      <div class="lb">포지션</div>
      <div class="v">${d.positions ? d.positions.length : 0}개</div>
      <div class="s">${d.surge_watchlist || 0}개 워치</div>
    </div>
  </div>`;

  // Positions
  const bn = {'batch_1':'1차','batch_2':'2차','batch_3':'3차','surge_trade':'급등'};
  if (d.positions && d.positions.length > 0) {
    html += '<div class="sec"><h2>보유 포지션</h2>';
    d.positions.forEach(p => {
      const holdTxt = p.hold_min >= 60 ? `${Math.floor(p.hold_min/60)}시간 ${p.hold_min%60}분` : `${p.hold_min}분`;
      const curPrice = p.cur_price ? fmt(p.cur_price) : '-';
      const buyPrice = p.buy_price ? fmt(p.buy_price) : '-';
      html += `<div class="pos">
        <div><div class="cn">${p.coin} <span class="tg ${p.batch==='surge_trade'?'ts':'tb'}">${bn[p.batch]||p.batch}</span></div>
        <div class="dt">${fmt(p.amount)}원 · ${holdTxt}</div>
        <div class="dt">매수 ${buyPrice} → 현재 ${curPrice}</div></div>
        <div class="pr ${pc(p.profit_rate)}">${p.profit_rate>=0?'+':''}${p.profit_rate.toFixed(2)}%</div>
      </div>`;
    });
    html += '</div>';
  }

  // Monthly
  const months = {};
  d.daily.forEach(x => {
    const mk = x.date.slice(0,7);
    if (!months[mk]) months[mk] = {pnl:0, trades:0, wins:0, losses:0, draws:0};
    months[mk].pnl += x.pnl;
    months[mk].trades += x.trades;
    months[mk].wins += (x.wins||0);
    months[mk].losses += (x.losses||0);
    months[mk].draws += (x.draws||0);
  });
  const mkeys = Object.keys(months);
  if (mkeys.length > 0) {
    const maxM = Math.max(...mkeys.map(k => Math.abs(months[k].pnl)), 1);
    html += '<div class="sec"><h2>월별 손익</h2>';
    mkeys.forEach((k, mi) => {
      const mv = months[k];
      const wr = mv.trades > 0 ? (mv.wins/mv.trades*100).toFixed(1) : 0;
      html += `<div class="month-bar" onclick="toggleDay('m${mi}')" style="cursor:pointer">
        <span class="d">${k.slice(5)}월</span>
        <div class="bw"><div class="b ${mv.pnl>=0?'bp':'bm'}" style="width:${Math.abs(mv.pnl)/maxM*100}%"></div></div>
        <span class="pn ${pc(mv.pnl)}">${ps(Math.round(mv.pnl))}</span>
      </div>
      <div class="day-detail" id="ddm${mi}">
        <div class="row"><span class="lbl">거래</span><span>${mv.trades}건</span></div>
        <div class="row"><span class="lbl">승률</span><span>${wr}%</span></div>
        <div class="row"><span class="lbl">성적</span><span>${mv.wins}승 ${mv.losses}패 ${mv.draws}무</span></div>
        <div class="row"><span class="lbl">손익</span><span class="${pc(mv.pnl)}">${ps(Math.round(mv.pnl))}원</span></div>
      </div>`;
    });
    html += '</div>';
  }

  // Daily
  html += '<div class="sec"><h2>일별 손익</h2>';
  d.daily.forEach((x, i) => {
    const wr = x.win_rate !== undefined ? x.win_rate : (x.trades > 0 ? ((x.wins||0)/x.trades*100).toFixed(1) : 0);
    html += `<div class="bar" onclick="toggleDay(${i})">
      <span class="d">${x.date.slice(5)}</span>
      <div class="bw"><div class="b ${x.pnl>=0?'bp':'bm'}" style="width:${Math.abs(x.pnl)/maxBar*100}%"></div></div>
      <span class="pn ${pc(x.pnl)}">${ps(Math.round(x.pnl))}</span>
    </div>
    <div class="day-detail" id="dd${i}">
      <div class="row"><span class="lbl">거래</span><span>${x.trades}건</span></div>
      <div class="row"><span class="lbl">승률</span><span>${wr}%</span></div>
      <div class="row"><span class="lbl">성적</span><span>${x.wins||0}승 ${x.losses||0}패 ${x.draws||0}무</span></div>
      <div class="row"><span class="lbl">손익</span><span class="${pc(x.pnl)}">${ps(Math.round(x.pnl))}원</span></div>
    </div>`;
  });
  html += '</div>';

  // Batches
  const batchNames = {
    'batch_1': '1차 매수',
    'batch_2': '2차 매수',
    'batch_3': '3차 매수',
    'surge_trade': '급등'
  };
  html += '<div class="sec"><h2>배치별 성적</h2><table><tr><th>배치</th><th>거래</th><th>승률</th><th>손익</th></tr>';
  d.batches.forEach(b => {
    const name = batchNames[b.batch] || b.batch;
    html += `<tr><td>${name}</td><td>${b.total}</td><td>${b.win_rate.toFixed(0)}%</td><td class="${pc(b.pnl)}">${ps(Math.round(b.pnl))}</td></tr>`;
  });
  html += '</table></div>';

  // Coins (코인별 성적, 5개 + 더보기)
  if (d.coins && d.coins.length > 0) {
    html += '<div class="sec"><h2>코인별 성적</h2><table><tr><th>코인</th><th>거래</th><th>승률</th><th>손익</th></tr>';
    d.coins.forEach((c, i) => {
      const hide = i >= 5 ? ' style="display:none" class="coin-row"' : ' class="coin-row"';
      html += `<tr${hide}><td>${c.coin}</td><td>${c.total}</td><td>${c.win_rate.toFixed(0)}%</td><td class="${pc(c.pnl)}">${ps(Math.round(c.pnl))}</td></tr>`;
    });
    html += '</table>';
    if (d.coins.length > 5) {
      html += `<div class="more-btn" onclick="showMoreCoins()">더보기 ▾</div>`;
    }
    html += '</div>';
  }

  // Changelog → 사이드 패널로 이동
  if (d.changelog && d.changelog.length > 0) {
    let logHtml = '';
    const logShow = 5;
    d.changelog.forEach((c, i) => {
      const hide = i >= logShow ? ' style="display:none" class="log-row"' : ' class="log-row"';
      logHtml += `<div${hide}><div class="cl-item">
        <span class="cl-time">${c.time}</span> <span class="cl-tag">${c.type}</span>
        <div class="cl-desc">${c.desc}</div>
      </div></div>`;
    });
    if (d.changelog.length > logShow) {
      logHtml += `<div class="more-btn" onclick="showMoreLogs()">더보기 ▾</div>`;
    }
    document.getElementById('logList').innerHTML = logHtml;
  }

  // Recent trades (5개씩 더보기)
  const bnShort = {'batch_1':'1차','batch_2':'2차','batch_3':'3차','surge_trade':'급등'};
  html += '<div class="sec"><h2>최근 거래</h2><table><tr><th>시간</th><th>코인</th><th>손익</th><th></th></tr>';
  d.recent.forEach((t, i) => {
    const tm = t.time.length > 5 ? t.time.slice(-5) : t.time;
    const pft = ps(Math.round(t.profit));
    const pct = `${t.profit_rate>=0?'+':''}${t.profit_rate.toFixed(1)}%`;
    const hide = i >= 5 ? ' style="display:none" class="trade-row"' : ' class="trade-row"';
    html += `<tr${hide}><td>${tm}</td><td>${t.coin}</td>
      <td class="${pc(t.profit)}">${pft}(${pct})</td>
      <td><span class="tg ${t.batch==='surge_trade'?'ts':'tb'}">${bnShort[t.batch]||t.batch}</span></td></tr>`;
  });
  html += '</table>';
  if (d.recent.length > 5) {
    html += `<div class="more-btn" id="moreBtn" onclick="showMore()">더보기 ▾</div>`;
  }
  html += '</div>';

  document.getElementById('app').innerHTML = html;
  if (d.version) {
    window._dashVer = d.version;
    document.getElementById('ver').textContent = 'v' + d.version;
  }
}

function toggleMenu() {
  document.getElementById('overlay').classList.toggle('open');
  document.getElementById('menuPanel').classList.toggle('open');
}

let logShown = 5;
function showMoreLogs() {
  const rows = document.querySelectorAll('.log-row');
  const next = logShown + 5;
  rows.forEach((r, i) => { if (i < next) r.style.display = ''; });
  logShown = next;
  if (logShown >= rows.length) {
    const btn = event.target;
    if (btn) btn.style.display = 'none';
  }
}

let coinShown = 5;
function showMoreCoins() {
  const rows = document.querySelectorAll('.coin-row');
  const next = coinShown + 10;
  rows.forEach((r, i) => { if (i < next) r.style.display = ''; });
  coinShown = next;
  if (coinShown >= rows.length) event.target.style.display = 'none';
}

function toggleDay(i) {
  const el = document.getElementById('dd' + i);
  if (el) el.classList.toggle('open');
}

let tradeShown = 5;
function showMore() {
  const rows = document.querySelectorAll('.trade-row');
  const next = tradeShown + 5;
  rows.forEach((r, i) => { if (i < next) r.style.display = ''; });
  tradeShown = next;
  if (tradeShown >= rows.length) {
    const btn = document.getElementById('moreBtn');
    if (btn) btn.style.display = 'none';
  }
}

load();
setInterval(load, 30000);

// Firebase 채팅 (실시간)

const db = firebase.firestore();
const chatRef = db.collection('upbit_chat');

function getTgConfig() {
  const token = localStorage.getItem('tg_token');
  const chatId = localStorage.getItem('tg_chat_id');
  return (token && chatId) ? { token, chatId } : null;
}

function renderChat(messages) {
  const log = document.getElementById('chatLog');
  if (!messages || messages.length === 0) {
    log.innerHTML = '<div style="text-align:center;color:#484f58;font-size:11px;padding:20px 0">메시지를 보내보세요</div>';
    return;
  }
  // ts 기준 정렬 (null은 맨 뒤로)
  messages.sort((a, b) => {
    const ta = a.ts ? (a.ts.seconds || 0) : (a._ts ? a._ts/1000 : 9999999999);
    const tb = b.ts ? (b.ts.seconds || 0) : (b._ts ? b._ts/1000 : 9999999999);
    return ta - tb;
  });
  log.innerHTML = messages.map((m, i) => {
    const cls = m.type === 'me' ? 'me' : 'bot';
    let check = '';
    if (m.type === 'me') {
      // 내 메시지 뒤에 봇 응답이 있으면 읽음(✓✓), 전송만 됐으면 ✓
      const hasReply = messages.slice(i + 1).some(x => x.type === 'bot');
      check = hasReply ? ' ✓✓' : ' ✓';
    }
    return `<div class="bubble ${cls}">${m.text}<div class="btime">${m.time}${check}</div></div>`;
  }).join('');
  log.scrollTop = log.scrollHeight;
}

// 실시간 리스너
function initChat() {
  if (!getTgConfig()) {
    document.getElementById('chatArea').style.display = 'none';
    document.getElementById('chatSetup').style.display = 'block';
    return;
  }
  chatRef.orderBy('ts').limitToLast(50).onSnapshot(snap => {
    const msgs = [];
    snap.forEach(doc => msgs.push(doc.data()));
    renderChat(msgs);
  });
}

function saveTgConfig() {
  const token = document.getElementById('tgToken').value.trim();
  const chatId = document.getElementById('tgChatId').value.trim();
  if (!token || !chatId) return;
  localStorage.setItem('tg_token', token);
  localStorage.setItem('tg_chat_id', chatId);
  document.getElementById('chatArea').style.display = 'block';
  document.getElementById('chatSetup').style.display = 'none';
  initChat();
}

async function sendChat() {
  const cfg = getTgConfig();
  if (!cfg) { initChat(); return; }
  const input = document.getElementById('chatMsg');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';

  const now = new Date();
  const time = `${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  // Firebase에 저장 (즉시 표시)
  await chatRef.add({ type: 'me', text: msg, time, ts: firebase.firestore.FieldValue.serverTimestamp(), _ts: Date.now() });

  // 텔레그램으로도 전송 (봇이 처리하도록)
  try {
    await fetch(`https://api.telegram.org/bot${cfg.token}/sendMessage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: cfg.chatId, text: '📊 [대시보드]\n' + msg })
    });
  } catch {}
  input.focus();
}

initChat();

// 버전 더블탭 → 페이지 강제 새로고침 (모바일+PC)
(function() {
  const el = document.getElementById('ver');
  let lastTap = 0;
  function doRefresh() {
    el.style.color = '#3fb950';
    el.style.background = '#3fb95022';
    el.textContent = '🔄 업데이트...';
    // 캐시 무시하고 페이지 자체를 새로 받아옴
    location.href = location.pathname + '?_=' + Date.now();
  }
  el.addEventListener('touchend', e => {
    const now = Date.now();
    if (now - lastTap < 400) { e.preventDefault(); doRefresh(); lastTap = 0; }
    else { lastTap = now; }
  });
  el.addEventListener('dblclick', doRefresh);
})();
</script>
