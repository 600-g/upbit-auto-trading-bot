<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🚀 업비트 자동매매 봇 v1.2.1</title>
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="업비트 자동매매 봇">
<style>
html { overscroll-behavior-y: contain; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 12px; max-width: 600px; margin: 0 auto; }
.hdr { display: flex; justify-content: space-between; align-items: center; padding: 8px 0 16px; }
.hdr h1 { font-size: 17px; color: #58a6ff; }
.hdr .tm { font-size: 11px; color: #484f58; }
.dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
.dot-on { background: #3fb950; box-shadow: 0 0 6px #3fb950; }
.dot-off { background: #f85149; }
.g { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.c { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px; }
.c.wide { grid-column: 1 / -1; }
.c .lb { font-size: 11px; color: #484f58; }
.c .v { font-size: 22px; font-weight: 700; margin: 2px 0; }
.c .s { font-size: 11px; color: #484f58; }
.p { color: #f85149; } .m { color: #3b82f6; } .z { color: #484f58; }
.sec { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
.sec h2 { font-size: 13px; color: #58a6ff; margin-bottom: 8px; cursor: pointer; }
.sec h2::after { content: ' ▾'; font-size: 10px; }
table { width: 100%; border-collapse: collapse; font-size: 11px; }
th { text-align: left; color: #484f58; font-weight: 500; padding: 3px 4px; border-bottom: 1px solid #30363d; white-space: nowrap; }
td { padding: 4px 4px; border-bottom: 1px solid #1c2028; white-space: nowrap; }
.tg { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 10px; font-weight: 600; }

.td { background: #272c33; color: #484f58; }
.ts { background: #1c2541; color: #79c0ff; }
.tb { background: #272c33; color: #d2a8ff; }
.bar { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; font-size: 11px; cursor: pointer; padding: 2px 0; border-radius: 4px; }
.bar:active { background: #1c2028; }
.bar .d { min-width: 46px; font-size: 13px; font-weight: 600; color: #8b949e; }
.bar .bw { flex: 1; height: 16px; background: #1c2028; border-radius: 3px; overflow: hidden; }
.bar .b { height: 100%; border-radius: 3px; min-width: 2px; transition: width .3s; }
.bp { background: #da3633; } .bm { background: #3b82f6; }
.bar .pn { min-width: 75px; text-align: right; font-weight: 600; }
.day-detail { background: #1c2028; border-radius: 6px; padding: 8px 10px; margin: 2px 0 6px; font-size: 11px; display: none; }

.more-btn:active { color: #79c0ff; }
.month-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; font-size: 12px; }
.month-bar .d { min-width: 36px; font-size: 13px; font-weight: 700; color: #8b949e; }

.pos { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #1c2028; }
.pos:last-child { border-bottom: none; }
.pos .cn { font-weight: 700; font-size: 14px; }
.pos .dt { font-size: 11px; color: #484f58; }
.pos .pr { font-size: 15px; font-weight: 700; }
.changelog { max-height: 200px; overflow-y: auto; }
.cl-item { padding: 6px 0; border-bottom: 1px solid #1c2028; font-size: 12px; }
.cl-item .cl-time { color: #484f58; font-size: 10px; }

.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200; }

.panel { position: fixed; top: 0; right: -280px; width: 280px; height: 100%; background: #161b22; border-left: 1px solid #30363d; z-index: 201; transition: right .25s ease; overflow-y: auto; padding: 16px; }
.panel.open { right: 0; }

.bubble.me { background: #238636; color: #fff; margin-left: auto; border-bottom-right-radius: 4px; }

.chat-bar { display: flex; gap: 6px; margin-top: 8px; }

.chat-bar button:active { background: #2ea043; }

.quick-cmds button:active { background: #238636; color: #fff; border-color: #238636; }
.ws-status { font-size: 10px; display: flex; align-items: center; gap: 4px; margin-bottom: 6px; }
.ws-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
.ws-dot.on { background: #3fb950; }
.ws-dot.off { background: #f85149; }
.ws-dot.connecting { background: #f0c040; animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: .3; } }
.thinking { display: flex; align-items: center; gap: 4px; padding: 8px 12px; }
.thinking .dot { width: 6px; height: 6px; background: #58a6ff; border-radius: 50%; animation: bounce .6s infinite alternate; }
.thinking .dot:nth-child(2) { animation-delay: .2s; }
.thinking .dot:nth-child(3) { animation-delay: .4s; }
@keyframes bounce { to { opacity: .3; transform: translateY(-4px); } }
.mkt { display: flex; align-items: center; gap: 10px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; }
.mkt .badge { font-size: 13px; font-weight: 700; padding: 3px 10px; border-radius: 6px; }
.mkt .info { flex: 1; font-size: 11px; color: #8b949e; }
.mkt .coins { font-size: 11px; }
.mode-bar { display: flex; align-items: center; gap: 8px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; }
.mode-bar .label { font-size: 12px; color: #8b949e; }
.mode-bar .mode-tag { font-size: 13px; font-weight: 700; padding: 3px 10px; border-radius: 6px; }
.mode-bar .mode-tag.demo { background: #1f6feb22; color: #58a6ff; }
.mode-bar .mode-tag.real { background: #f8514922; color: #f85149; }
.mode-toggle { margin-left: auto; position: relative; width: 48px; height: 26px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.mode-toggle input { display: none; }
.mode-toggle .slider { position: absolute; inset: 0; background: #1f6feb; border-radius: 13px; transition: .3s; }
.mode-toggle .slider::before { content: ''; position: absolute; width: 20px; height: 20px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: .3s; }
.mode-toggle input:checked + .slider { background: #f85149; }
.mode-toggle input:checked + .slider::before { transform: translateX(22px); }
.mom-gauge { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
.mom-gauge h3 { font-size: 12px; color: #58a6ff; margin-bottom: 8px; }
.mom-bar-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; font-size: 11px; }
.mom-bar-row .coin { min-width: 48px; font-weight: 600; color: #c9d1d9; }
.mom-bar-row .score { min-width: 36px; text-align: right; font-weight: 600; }
.mom-bar-row .track { flex: 1; height: 14px; background: #1c2028; border-radius: 3px; overflow: hidden; position: relative; }
.mom-bar-row .fill { height: 100%; border-radius: 3px; transition: width .5s; }
.mom-bar-row .threshold-line { position: absolute; top: 0; height: 100%; width: 2px; background: #f0c040; z-index: 1; }
.mom-stats { display: flex; justify-content: space-between; margin-top: 8px; font-size: 10px; color: #484f58; }
.mom-stats .val { color: #8b949e; font-weight: 600; }
/* v1.2.1: 일 목표 프로그레스 */
.goal-bar { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
.goal-bar .title { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
.goal-bar .title .lb { font-size: 12px; color: #58a6ff; font-weight: 600; }
.goal-bar .title .pct { font-size: 20px; font-weight: 700; }
.goal-track { height: 20px; background: #1c2028; border-radius: 10px; overflow: hidden; position: relative; }
.goal-track .fill { height: 100%; border-radius: 10px; transition: width .5s; position: relative; }
.goal-track .fill.positive { background: linear-gradient(90deg, #238636, #3fb950); }
.goal-track .fill.negative { background: linear-gradient(90deg, #da3633, #f85149); }
.goal-track .mark { position: absolute; top: 0; height: 100%; width: 2px; background: #f0c040; z-index: 1; }
.goal-sub { display: flex; justify-content: space-between; margin-top: 6px; font-size: 10px; color: #484f58; }
/* R:R 비율 카드 */
.rr-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
.rr-card h3 { font-size: 12px; color: #58a6ff; margin-bottom: 8px; }
.rr-bars { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.rr-bars .label { font-size: 11px; min-width: 50px; }
.rr-bars .track { flex: 1; height: 16px; background: #1c2028; border-radius: 4px; overflow: hidden; }
.rr-bars .fill-w { height: 100%; background: #da3633; border-radius: 4px; }
.rr-bars .fill-l { height: 100%; background: #3b82f6; border-radius: 4px; }
.rr-bars .val { font-size: 12px; font-weight: 700; min-width: 65px; text-align: right; }
.rr-ratio { text-align: center; font-size: 14px; font-weight: 700; margin-top: 4px; padding: 6px; background: #1c2028; border-radius: 6px; }
/* 누적 수익 그래프 */
.equity-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
.equity-card h3 { font-size: 12px; color: #58a6ff; margin-bottom: 8px; }
.equity-svg { width: 100%; height: 120px; }
/* AI 판단 피드 */
.ai-feed { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
.ai-feed h3 { font-size: 12px; color: #58a6ff; margin-bottom: 8px; cursor: pointer; }
.ai-feed h3::after { content: ' ▾'; font-size: 10px; }
.ai-item { display: flex; align-items: center; gap: 8px; padding: 4px 0; border-bottom: 1px solid #1c2028; font-size: 11px; }
.ai-item:last-child { border-bottom: none; }
.ai-item .coin { font-weight: 700; min-width: 44px; }
.ai-item .act { font-size: 10px; padding: 1px 5px; border-radius: 3px; font-weight: 600; white-space: nowrap; }
.ai-item .act.allow { background: #23863622; color: #3fb950; }
.ai-item .act.block { background: #da363322; color: #f85149; }
.ai-item .act.hold { background: #1f6feb22; color: #58a6ff; }
.ai-item .rsn { color: #8b949e; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
/* AI 교훈 카드 */
.lesson-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
.lesson-card h3 { font-size: 12px; color: #58a6ff; margin-bottom: 8px; }
.lesson-pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; margin: 2px 3px; }
.lesson-pill.early_exit { background: #f8514922; color: #f85149; }
.lesson-pill.timing { background: #f0c04022; color: #f0c040; }
.lesson-pill.overchase { background: #d2a8ff22; color: #d2a8ff; }
.lesson-pill.ignore_trend { background: #3b82f622; color: #3b82f6; }
/* 포지션 미니 게이지 */
.pos-gauge { width: 60px; height: 8px; background: #1c2028; border-radius: 4px; overflow: hidden; margin-top: 4px; }
.pos-gauge .gf { height: 100%; border-radius: 4px; }
</style>
<!-- WebSocket 직통 채팅 (Firebase 제거) -->
</head>
<body>
<div class="hdr">
  <h1><span class="dot" id="dot"></span>🚀 업비트 자동매매 봇 <span id="ver" style="font-size:11px;color:#484f58;font-weight:400;cursor:pointer;padding:4px 8px;border-radius:4px;-webkit-tap-highlight-color:transparent">v1.2.1</span></h1>
  <div><span class="tm" id="tm"></span> <span class="menu-btn" onclick="toggleMenu()">☰</span></div>
</div>
<div id="overlay" class="overlay" onclick="toggleMenu()"></div>
<div id="menuPanel" class="panel">
  <span class="close" onclick="toggleMenu()">✕</span>
  <h3>AutoTune 개선 로그</h3>
  <div id="logList"></div>
  <div class="chat-wrap">
    <h3>💬 매매봇 채팅</h3>
    <div class="ws-status" id="wsStatus"><span class="ws-dot off"></span> 연결 안 됨</div>
    <div id="chatArea">
      <div class="chat-log" id="chatLog"></div>
      <div class="quick-cmds">
        <button onclick="quickCmd('오늘 승패 분석해줘. 승률, 평균수익/손실, 가장 큰 수익/손실 코인, 개선점 알려줘')">📊 승패 분석</button>
      </div>
      <div class="chat-bar">
        <input id="chatMsg" placeholder="메시지 입력..." onkeydown="if(event.key==='Enter')sendChat()">
        <button id="chatSendBtn" onclick="sendChat()">↑</button>
      </div>
    </div>
  </div>
</div>
<div id="app"><div class="loading">로딩 중...</div></div>

<script>
const DATA_URL = 'status.json';
const fmt = n => n.toLocaleString('ko-KR');
const pc = n => n > 0 ? 'p' : n < 0 ? 'm' : 'z';
const ps = n => (n > 0 ? '+' : '') + fmt(n);

async function load() {
  try {
    const r = await fetch(DATA_URL + '?t=' + Date.now());
    if (!r.ok) throw new Error('fetch failed');
    const d = await r.json();
    render(d);
  } catch(e) {
    document.getElementById('dot').className = 'dot dot-off';
    document.getElementById('app').innerHTML = '<div class="err">데이터 로드 실패<br><small>status.json 확인</small></div>';
  }
}

function render(d) {
  document.getElementById('dot').className = 'dot ' + (d.bot_running ? 'dot-on' : 'dot-off');
  document.getElementById('tm').textContent = d.updated;

  const assetPnl = d.total_asset_pnl || (d.balance - 10000000);
  const pnlPct = (assetPnl / 100000).toFixed(2);
  const maxBar = Math.max(...d.daily.map(x => Math.abs(x.pnl)), 1);

  // Mode bar
  const mode = d.bot_mode || 'demo';
  const modeIsReal = mode === 'real';
  let html = `<div class="mode-bar">
    <span class="label">모드</span>
    <span class="mode-tag ${mode}">${mode.toUpperCase()}</span>
    <span class="label" style="flex:1;text-align:center;font-size:10px;color:#484f58">${modeIsReal ? '실전 거래 중' : '가상 매매 중'}</span>
    <label class="mode-toggle" title="${modeIsReal ? 'DEMO로 전환' : 'REAL로 전환'}">
      <input type="checkbox" ${modeIsReal ? 'checked' : ''} onchange="toggleMode(this.checked)">
      <span class="slider"></span>
    </label>
  </div>`;

  // Market index
  const m = d.market || {};
  if (m.grade) {
    html += `<div class="mkt">
      <span class="badge" style="background:${m.color}22;color:${m.color}">${m.grade}</span>
      <span class="info">${m.detail || ''}</span>
      <span class="coins">BTC <span class="${pc(m.btc_chg)}">${m.btc_chg>=0?'+':''}${m.btc_chg}%</span> · ALT <span class="${pc(m.alt_chg)}">${m.alt_chg>=0?'+':''}${m.alt_chg}%</span></span>
    </div>`;
  }

  // 일 목표 프로그레스 (잔고 × 5% — 복리)
  const baseBalance = (d.balance || 10000000) - (d.today_pnl || 0);  // 오늘 시작 시점 잔고
  const goalAmt = Math.round(baseBalance * 0.05);
  const todayPnl = d.today_pnl || 0;
  const goalPct = Math.min(Math.max(todayPnl / goalAmt * 100, -100), 150);
  const goalColor = todayPnl >= 0 ? 'positive' : 'negative';
  const goalFillW = Math.min(Math.abs(goalPct), 100);
  html += `<div class="goal-bar">
    <div class="title">
      <span class="lb">오늘 목표 5% (${fmt(goalAmt)}원)</span>
      <span class="pct ${pc(todayPnl)}">${goalPct >= 0 ? '+' : ''}${goalPct.toFixed(1)}%</span>
    </div>
    <div class="goal-track">
      <div class="mark" style="left:100%"></div>
      <div class="fill ${goalColor}" style="width:${goalFillW}%"></div>
    </div>
    <div class="goal-sub">
      <span>현재 ${ps(Math.round(todayPnl))}원</span>
      <span>남은 ${ps(Math.round(goalAmt - todayPnl))}원</span>
      <span>${d.today_trades || 0}건 거래</span>
    </div>
  </div>`;

  // Momentum gauge
  const mom = d.momentum || {};
  if (mom.top10 && mom.top10.length > 0) {
    const maxScore = Math.max(mom.top10[0].score, 50);
    const thresh = mom.threshold || 0;
    const pct = mom.market_pct || {};
    html += `<div class="mom-gauge"><h3>모멘텀 현황</h3>`;
    mom.top10.forEach((item, i) => {
      const pctW = Math.min(100, item.score / maxScore * 100);
      const passThresh = item.score >= thresh;
      const color = passThresh ? '#3fb950' : (item.score >= thresh * 0.8 ? '#f0c040' : '#484f58');
      html += `<div class="mom-bar-row">
        <span class="coin">${i+1}. ${item.coin}</span>
        <div class="track">
          ${thresh > 0 ? `<div class="threshold-line" style="left:${Math.min(100,thresh/maxScore*100)}%"></div>` : ''}
          <div class="fill" style="width:${pctW}%;background:${color}"></div>
        </div>
        <span class="score" style="color:${color}">${item.score}</span>
      </div>`;
    });
    html += `<div class="mom-stats">
      <span>기준선: <span class="val">${thresh}점</span></span>
      ${pct.p10 ? `<span>TOP10%: <span class="val">${pct.p10}</span></span>` : ''}
      ${pct.p20 ? `<span>TOP20%: <span class="val">${pct.p20}</span></span>` : ''}
      ${pct.median ? `<span>중위: <span class="val">${pct.median}</span></span>` : ''}
    </div>`;
    html += `</div>`;
  }

  html += `
  <div class="g">
    <div class="c">
      <div class="lb">총 자산</div>
      <div class="v">${fmt(Math.round(d.balance))}</div>
      <div class="s ${pc(assetPnl)}">${ps(Math.round(assetPnl))}원 (${assetPnl>=0?'+':''}${pnlPct}%)</div>
    </div>
    <div class="c">
      <div class="lb">승률</div>
      <div class="v ${d.win_rate>=40?'p':d.win_rate>=30?'z':'m'}">${d.win_rate.toFixed(1)}%</div>
      <div class="s">${d.wins}승 ${d.losses}패 ${d.draws}무 (${d.total_trades}건)</div>
    </div>
    <div class="c">
      <div class="lb">오늘</div>
      <div class="v ${pc(d.today_pnl)}">${ps(Math.round(d.today_pnl))}</div>
      <div class="s">${d.today_trades}건 | 승률 ${d.today_wr.toFixed(0)}%</div>
    </div>
    <div class="c">
      <div class="lb">포지션</div>
      <div class="v">${d.positions ? d.positions.length : 0}개</div>
      <div class="s">${d.surge_watchlist || 0}개 워치</div>
    </div>
  </div>`;

  // R:R 비율 카드
  const rr = d.rr_stats || {};
  if (rr.avg_win || rr.avg_loss) {
    const maxRR = Math.max(Math.abs(rr.avg_win), Math.abs(rr.avg_loss), 1);
    const rrColor = rr.rr_ratio >= 2 ? '#3fb950' : rr.rr_ratio >= 1.5 ? '#f0c040' : '#f85149';
    html += `<div class="rr-card"><h3>수익/손실 비율 (R:R)</h3>
      <div class="rr-bars">
        <span class="label p">평균 수익</span>
        <div class="track"><div class="fill-w" style="width:${Math.abs(rr.avg_win)/maxRR*100}%"></div></div>
        <span class="val p">${ps(rr.avg_win)}원</span>
      </div>
      <div class="rr-bars">
        <span class="label m">평균 손실</span>
        <div class="track"><div class="fill-l" style="width:${Math.abs(rr.avg_loss)/maxRR*100}%"></div></div>
        <span class="val m">${fmt(rr.avg_loss)}원</span>
      </div>
      <div class="rr-ratio" style="color:${rrColor}">R:R = ${rr.rr_ratio || '—'}
        <span style="font-size:10px;color:#484f58;font-weight:400;margin-left:8px">(목표: 2.0 이상)</span>
      </div>
    </div>`;
  }

  // 누적 수익 곡선
  const eq = d.equity_curve || [];
  if (eq.length >= 2) {
    const eqMin = Math.min(...eq.map(e => e.equity));
    const eqMax = Math.max(...eq.map(e => e.equity));
    const eqRange = eqMax - eqMin || 1;
    const svgW = 100;
    const svgH = 100;
    const pad = 5;
    const points = eq.map((e, i) => {
      const x = pad + (i / (eq.length - 1)) * (svgW - pad * 2);
      const y = svgH - pad - ((e.equity - eqMin) / eqRange) * (svgH - pad * 2);
      return `${x},${y}`;
    }).join(' ');
    const lastEq = eq[eq.length - 1].equity;
    const lineColor = lastEq >= 0 ? '#3fb950' : '#f85149';
    const fillColor = lastEq >= 0 ? '#3fb95015' : '#f8514915';
    const zeroY = svgH - pad - ((0 - eqMin) / eqRange) * (svgH - pad * 2);
    const areaPoints = `${pad},${zeroY} ` + points + ` ${svgW - pad},${zeroY}`;
    html += `<div class="equity-card"><h3>누적 수익 곡선</h3>
      <svg class="equity-svg" viewBox="0 0 ${svgW} ${svgH}" preserveAspectRatio="none">
        <line x1="${pad}" y1="${zeroY}" x2="${svgW-pad}" y2="${zeroY}" stroke="#30363d" stroke-width="0.5" stroke-dasharray="2"/>
        <polygon points="${areaPoints}" fill="${fillColor}"/>
        <polyline points="${points}" fill="none" stroke="${lineColor}" stroke-width="1.5" stroke-linejoin="round"/>
        <circle cx="${points.split(' ').pop().split(',')[0]}" cy="${points.split(' ').pop().split(',')[1]}" r="2" fill="${lineColor}"/>
      </svg>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:#484f58;margin-top:4px">
        <span>${eq[0].date.slice(5)}</span>
        <span class="${pc(lastEq)}">누적 ${ps(lastEq)}원</span>
        <span>${eq[eq.length-1].date.slice(5)}</span>
      </div>
    </div>`;
  }

  // AI 판단 피드
  const aiD = d.ai_decisions || [];
  if (aiD.length > 0) {
    html += `<div class="ai-feed"><h3 onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">AI 판단 로그</h3><div>`;
    aiD.forEach(a => {
      let cls = 'hold';
      if (a.action.includes('허용')) cls = 'allow';
      else if (a.action.includes('차단') || a.action.includes('매도')) cls = 'block';
      html += `<div class="ai-item">
        <span class="coin">${a.coin}</span>
        <span class="act ${cls}">${a.action}</span>
        <span class="rsn">${a.reason}</span>
      </div>`;
    });
    html += '</div></div>';
  }

  // AI 교훈 카드
  const aiS = d.ai_stats || {};
  if (aiS.total_lessons > 0 && aiS.mistakes && aiS.mistakes.length > 0) {
    const typeNames = {'early_exit':'조기익절','timing':'타이밍','overchase':'추격매수','ignore_trend':'추세무시'};
    html += `<div class="lesson-card"><h3>AI 교훈 요약 <span style="font-size:10px;color:#484f58;font-weight:400">(${aiS.total_lessons}건, 심각도 ${aiS.avg_severity})</span></h3>`;
    aiS.mistakes.forEach(m => {
      const name = typeNames[m.type] || m.type;
      html += `<span class="lesson-pill ${m.type}">${name} ${m.count}건</span>`;
    });
    html += '</div>';
  }

  // Positions
  const bn = {'batch_1':'1차','batch_2':'2차','batch_3':'3차','surge_trade':'급등','idle_trade':'중타'};
  if (d.positions && d.positions.length > 0) {
    const totalInvested = d.positions.reduce((s,p) => s + (p.cur_amount || p.amount || 0), 0);
    const totalPnlPos = d.positions.reduce((s,p) => s + ((p.cur_amount||p.amount||0) - (p.amount||0)), 0);
    html += `<div class="sec"><h2>보유 포지션 <span style="font-size:11px;font-weight:400;color:#8b949e">${d.positions.length}개 · 평가 ${fmt(totalInvested)}원 <span class="${pc(totalPnlPos)}">(${ps(Math.round(totalPnlPos))})</span></span></h2>`;
    d.positions.forEach(p => {
      const holdTxt = p.hold_min >= 60 ? `${Math.floor(p.hold_min/60)}시간 ${p.hold_min%60}분` : `${p.hold_min}분`;
      const curPrice = p.cur_price ? fmt(p.cur_price) : '-';
      const buyPrice = p.buy_price ? fmt(p.buy_price) : '-';
      const curAmt = p.cur_amount ? fmt(p.cur_amount) : fmt(p.amount);
      const pnlAmt = p.cur_amount ? p.cur_amount - p.amount : 0;
      const batchCls = p.batch==='surge_trade'?'ts':p.batch==='idle_trade'?'td':'tb';
      const gaugeW = Math.min(Math.abs(p.profit_rate) * 10, 100);
      const gaugeC = p.profit_rate >= 0 ? '#da3633' : '#3b82f6';
      html += `<div class="pos">
        <div style="flex:1"><div class="cn">${p.coin} <span class="tg ${batchCls}">${bn[p.batch]||p.batch}</span></div>
        <div class="dt">${fmt(p.amount)}원 → ${curAmt}원 <span class="${pc(pnlAmt)}">(${ps(Math.round(pnlAmt))})</span> · ${holdTxt}</div>
        <div class="dt">매수 ${buyPrice} → 현재 ${curPrice}</div>
        <div class="pos-gauge"><div class="gf" style="width:${gaugeW}%;background:${gaugeC}"></div></div></div>
        <div class="pr ${pc(p.profit_rate)}">${p.profit_rate>=0?'+':''}${p.profit_rate.toFixed(2)}%</div>
      </div>`;
    });
    html += '</div>';
  }

  // Monthly
  const months = {};
  d.daily.forEach(x => {
    const mk = x.date.slice(0,7);
    if (!months[mk]) months[mk] = {pnl:0, trades:0, wins:0, losses:0, draws:0};
    months[mk].pnl += x.pnl;
    months[mk].trades += x.trades;
    months[mk].wins += (x.wins||0);
    months[mk].losses += (x.losses||0);
    months[mk].draws += (x.draws||0);
  });
  const mkeys = Object.keys(months);
  if (mkeys.length > 0) {
    const maxM = Math.max(...mkeys.map(k => Math.abs(months[k].pnl)), 1);
    html += '<div class="sec"><h2>월별 손익</h2>';
    mkeys.forEach((k, mi) => {
      const mv = months[k];
      const wr = mv.trades > 0 ? (mv.wins/mv.trades*100).toFixed(1) : 0;
      html += `<div class="month-bar" onclick="toggleDay('m${mi}')" style="cursor:pointer">
        <span class="d">${k.slice(5)}월</span>
        <div class="bw"><div class="b ${mv.pnl>=0?'bp':'bm'}" style="width:${Math.abs(mv.pnl)/maxM*100}%"></div></div>
        <span class="pn ${pc(mv.pnl)}">${ps(Math.round(mv.pnl))}</span>
      </div>
      <div class="day-detail" id="ddm${mi}">
        <div class="row"><span class="lbl">거래</span><span>${mv.trades}건</span></div>
        <div class="row"><span class="lbl">승률</span><span>${wr}%</span></div>
        <div class="row"><span class="lbl">성적</span><span>${mv.wins}승 ${mv.losses}패 ${mv.draws}무</span></div>
        <div class="row"><span class="lbl">손익</span><span class="${pc(mv.pnl)}">${ps(Math.round(mv.pnl))}원</span></div>
      </div>`;
    });
    html += '</div>';
  }

  // Daily
  html += '<div class="sec"><h2>일별 손익</h2>';
  d.daily.forEach((x, i) => {
    const wr = x.win_rate !== undefined ? x.win_rate : (x.trades > 0 ? ((x.wins||0)/x.trades*100).toFixed(1) : 0);
    html += `<div class="bar" onclick="toggleDay(${i})">
      <span class="d">${x.date.slice(5)}</span>
      <div class="bw"><div class="b ${x.pnl>=0?'bp':'bm'}" style="width:${Math.abs(x.pnl)/maxBar*100}%"></div></div>
      <span class="pn ${pc(x.pnl)}">${ps(Math.round(x.pnl))}</span>
    </div>
    <div class="day-detail" id="dd${i}">
      <div class="row"><span class="lbl">거래</span><span>${x.trades}건</span></div>
      <div class="row"><span class="lbl">승률</span><span>${wr}%</span></div>
      <div class="row"><span class="lbl">성적</span><span>${x.wins||0}승 ${x.losses||0}패 ${x.draws||0}무</span></div>
      <div class="row"><span class="lbl">손익</span><span class="${pc(x.pnl)}">${ps(Math.round(x.pnl))}원</span></div>
    </div>`;
  });
  html += '</div>';

  // Recent trades (일별 손익 바로 아래)
  const bnShort = {'batch_1':'1차','batch_2':'2차','batch_3':'3차','surge_trade':'급등','idle_trade':'중타'};
  html += '<div class="sec"><h2>최근 거래</h2><table><tr><th>시간</th><th>코인</th><th>손익</th><th></th></tr>';
  d.recent.forEach((t, i) => {
    const tm = t.time.length > 5 ? t.time.slice(-5) : t.time;
    const pft = ps(Math.round(t.profit));
    const pct = `${t.profit_rate>=0?'+':''}${t.profit_rate.toFixed(1)}%`;
    const hide = i >= 5 ? ' style="display:none" class="trade-row"' : ' class="trade-row"';
    html += `<tr${hide}><td>${tm}</td><td>${t.coin}</td>
      <td class="${pc(t.profit)}">${pft}(${pct})</td>
      <td><span class="tg ${t.batch==='surge_trade'?'ts':t.batch==='idle_trade'?'td':'tb'}">${bnShort[t.batch]||t.batch}</span></td></tr>`;
  });
  html += '</table>';
  if (d.recent.length > 5) {
    html += `<div class="more-btn" id="moreBtn" onclick="showMore()">더보기 ▾</div>`;
  }
  html += '</div>';

  // Batches
  const batchNames = {
    'batch_1': '1차 매수',
    'batch_2': '2차 매수',
    'batch_3': '3차 매수',
    'surge_trade': '급등',
    'idle_trade': '중타'
  };
  // 시간대별 히트맵
  if (d.hourly && d.hourly.length > 0) {
    const allH = Array.from({length:24},(_,i)=>{const f=d.hourly.find(h=>h.hour===i);return f||{hour:i,cnt:0,wins:0,wr:0,pnl:0};});
    const mx = Math.max(...allH.map(h=>Math.abs(h.pnl)),1);
    function hc(h){
      let bg,bd;
      if(!h.cnt){bg='#161b22';bd='#30363d';}
      else if(h.wr>=50&&h.pnl>0){bg=`rgba(35,134,54,${Math.min(.8,Math.abs(h.pnl)/mx+.2)})`;bd='#238636';}
      else if(h.wr<40||h.pnl<-50000){bg=`rgba(218,54,51,${Math.min(.8,Math.abs(h.pnl)/mx+.2)})`;bd='#da3633';}
      else{bg=`rgba(187,128,9,${Math.min(.6,Math.abs(h.pnl)/mx+.15)})`;bd='#bb8009';}
      const p=h.pnl>=0?'+'+(h.pnl/1000).toFixed(0)+'k':(h.pnl/1000).toFixed(0)+'k';
      return `<div style="background:${bg};border:1px solid ${bd};border-radius:4px;padding:3px 0;text-align:center;min-height:42px;">
        <div style="font-size:9px;color:#8b949e;">${h.hour}시</div>
        <div style="font-size:11px;font-weight:700;color:${h.wr>=50?'#3fb950':h.wr<40?'#f85149':'#e3b341'}">${h.cnt?h.wr+'%':'-'}</div>
        <div style="font-size:8px;color:${h.pnl>=0?'#3fb950':'#f85149'}">${h.cnt?p:''}</div></div>`;
    }
    html += '<div class="sec"><h2>시간대별 성과</h2>';
    html += '<div style="display:grid;grid-template-columns:repeat(8,1fr);gap:2px;margin-bottom:2px;">'+allH.slice(0,8).map(hc).join('')+'</div>';
    html += '<div style="display:grid;grid-template-columns:repeat(8,1fr);gap:2px;margin-bottom:2px;">'+allH.slice(8,16).map(hc).join('')+'</div>';
    html += '<div style="display:grid;grid-template-columns:repeat(8,1fr);gap:2px;">'+allH.slice(16).map(hc).join('')+'</div>';
    html += '<div style="font-size:10px;color:#484f58;margin-top:6px;display:flex;justify-content:space-between;"><span>🟢50%+수익</span><span>🟡혼합</span><span>🔴40%-손실</span></div></div>';
  }

  html += '<div class="sec"><h2>배치별 성적</h2><table><tr><th>배치</th><th>거래</th><th>승률</th><th>손익</th></tr>';
  d.batches.forEach(b => {
    const name = batchNames[b.batch] || b.batch;
    html += `<tr><td>${name}</td><td>${b.total}</td><td>${b.win_rate.toFixed(0)}%</td><td class="${pc(b.pnl)}">${ps(Math.round(b.pnl))}</td></tr>`;
  });
  html += '</table></div>';

  // Coins (코인별 성적, 5개 + 더보기)
  if (d.coins && d.coins.length > 0) {
    html += '<div class="sec"><h2>코인별 성적</h2><table><tr><th>코인</th><th>거래</th><th>승률</th><th>손익</th></tr>';
    d.coins.forEach((c, i) => {
      const hide = i >= 5 ? ' style="display:none" class="coin-row"' : ' class="coin-row"';
      html += `<tr${hide}><td>${c.coin}</td><td>${c.total}</td><td>${c.win_rate.toFixed(0)}%</td><td class="${pc(c.pnl)}">${ps(Math.round(c.pnl))}</td></tr>`;
    });
    html += '</table>';
    if (d.coins.length > 5) {
      html += `<div class="more-btn" onclick="showMoreCoins()">더보기 ▾</div>`;
    }
    html += '</div>';
  }

  // Changelog → 사이드 패널로 이동
  if (d.changelog && d.changelog.length > 0) {
    let logHtml = '';
    const logShow = 5;
    d.changelog.forEach((c, i) => {
      const hide = i >= logShow ? ' style="display:none" class="log-row"' : ' class="log-row"';
      logHtml += `<div${hide}><div class="cl-item">
        <span class="cl-time">${c.time}</span> <span class="cl-tag">${c.type}</span>
        <div class="cl-desc">${c.desc}</div>
      </div></div>`;
    });
    if (d.changelog.length > logShow) {
      logHtml += `<div class="more-btn" onclick="showMoreLogs()">더보기 ▾</div>`;
    }
    document.getElementById('logList').innerHTML = logHtml;
  }

  document.getElementById('app').innerHTML = html;
  if (d.version) {
    window._dashVer = d.version;
    document.getElementById('ver').textContent = 'v' + d.version;
  }
}

// 모드 전환 (Firebase upbit_control 직접 제어)
const FB_REST = 'https://firestore.googleapis.com/v1/projects/datemap-759bf/databases/(default)/documents';

async function toggleMode(toReal) {
  const target = toReal ? 'real' : 'demo';
  let pin = '';

  if (toReal) {
    pin = prompt('⚠️ REAL 모드 전환\n실제 자금으로 거래됩니다.\n\nPIN 4자리를 입력하세요:');
    if (!pin || pin.length !== 4) {
      document.querySelector('.mode-toggle input').checked = false;
      if (pin !== null) showToast('PIN 4자리를 입력하세요', 'warn');
      return;
    }
  } else {
    if (!confirm('DEMO 모드로 전환하시겠습니까?')) {
      document.querySelector('.mode-toggle input').checked = true;
      return;
    }
  }

  try {
    const fields = {
      action: { stringValue: 'switch' },
      mode: { stringValue: target },
      ts: { timestampValue: new Date().toISOString() }
    };
    if (pin) fields.pin = { stringValue: pin };

    const resp = await fetch(FB_REST + '/upbit_control', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fields })
    });
    if (resp.ok) {
      showToast('전환 요청 전송됨...', 'info');
      pollModeChange(target, 30);
    } else {
      throw new Error('Firebase 오류');
    }
  } catch(e) {
    showToast('전환 실패: ' + e.message, 'err');
    document.querySelector('.mode-toggle input').checked = !toReal;
  }
}

// 모드 전환 결과 폴링
async function pollModeChange(target, maxSec) {
  const start = Date.now();
  const poll = setInterval(async () => {
    if (Date.now() - start > maxSec * 1000) {
      clearInterval(poll);
      showToast('전환 시간 초과 — 봇 상태를 확인하세요', 'warn');
      return;
    }
    try {
      const resp = await fetch(FB_REST + '/upbit_status/current', { cache: 'no-store' });
      if (resp.ok) {
        const doc = await resp.json();
        const curMode = doc.fields?.mode?.stringValue;
        const err = doc.fields?.error?.stringValue;
        if (err === 'PIN_WRONG') {
          clearInterval(poll);
          showToast('PIN이 틀렸습니다', 'err');
          document.querySelector('.mode-toggle input').checked = (curMode === 'real');
          // 에러 필드 클리어
          fetch(FB_REST + '/upbit_status/current?updateMask.fieldPaths=error', {
            method: 'PATCH', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({fields:{error:{stringValue:''}}})
          }).catch(()=>{});
          return;
        }
        if (curMode === target) {
          clearInterval(poll);
          showToast(`${target.toUpperCase()} 모드 전환 완료!`, 'ok');
          load();
        }
      }
    } catch {}
  }, 3000);
}

// 토스트 알림
function showToast(msg, type) {
  const colors = { ok: '#3fb950', warn: '#f0c040', info: '#58a6ff', err: '#f85149' };
  const el = document.createElement('div');
  el.textContent = msg;
  Object.assign(el.style, {
    position: 'fixed', bottom: '20px', left: '50%', transform: 'translateX(-50%)',
    background: colors[type] || '#30363d', color: '#fff', padding: '10px 20px',
    borderRadius: '8px', fontSize: '13px', fontWeight: '600', zIndex: '999',
    boxShadow: '0 4px 12px rgba(0,0,0,.4)', transition: 'opacity .3s'
  });
  document.body.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 3000);
}

// ── 에이전트 채팅 (WebSocket 직통) ──────────────────────
const WS_BASE = 'wss://api.600g.net/ws/chat/';
const WS_FALLBACK = 'ws://localhost:8000/ws/chat/';
const WS_TEAM_ID = 'trading-bot';
let wsConn = null;
let wsTeamId = WS_TEAM_ID;
let wsStreaming = false;
let wsStreamBubble = null;
let wsMessages = {}; // teamId -> [{type, content}]

function initChat() {
  connectWS();
}

function setWsStatus(state) {
  const el = document.getElementById('wsStatus');
  if (state === 'on') el.innerHTML = '<span class="ws-dot on"></span> 🤖 매매봇 연결됨';
  else if (state === 'connecting') el.innerHTML = '<span class="ws-dot connecting"></span> 연결 중...';
  else el.innerHTML = '<span class="ws-dot off"></span> 연결 안 됨';
}

function connectWS() {
  setWsStatus('connecting');
  // 먼저 외부 URL 시도, 실패하면 localhost fallback
  _tryConnect(WS_BASE + wsTeamId, () => {
    _tryConnect(WS_FALLBACK + wsTeamId, () => {
      setWsStatus('off');
      showToast('서버 연결 실패 — company-hq 서버 확인', 'err');
    });
  });
}

function _tryConnect(url, onFail) {
  const ws = new WebSocket(url);
  const timeout = setTimeout(() => { ws.close(); onFail(); }, 5000);
  ws.onopen = () => {
    clearTimeout(timeout);
    wsConn = ws;
    setWsStatus('on');
  };
  ws.onmessage = (e) => {
    try { handleWsMessage(JSON.parse(e.data)); } catch {}
  };
  ws.onerror = () => { clearTimeout(timeout); };
  ws.onclose = () => {
    if (wsConn === ws) { wsConn = null; setWsStatus('off'); }
  };
}

function handleWsMessage(data) {
  const log = document.getElementById('chatLog');
  if (data.type === 'history_sync') {
    // 서버에서 과거 대화 수신
    wsMessages[wsTeamId] = (data.messages || []).map(m => ({
      type: m.type === 'user' ? 'me' : 'bot',
      content: m.content || '',
      cancelled: m.cancelled || false,
    }));
    renderChatLog();
  } else if (data.type === 'user') {
    // 내 메시지 에코 (이미 로컬에 추가했으므로 무시)
  } else if (data.type === 'ai_start') {
    wsStreaming = true;
    updateSendBtn();
    // 생각 중 표시
    log.innerHTML += '<div id="thinkingDots" class="bubble bot streaming thinking"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
    log.scrollTop = log.scrollHeight;
  } else if (data.type === 'ai_chunk') {
    // 생각 중 제거
    const dots = document.getElementById('thinkingDots');
    if (dots) dots.remove();
    // 스트리밍 버블
    if (!wsStreamBubble) {
      const div = document.createElement('div');
      div.className = 'bubble bot streaming';
      div.id = 'streamBubble';
      log.appendChild(div);
      wsStreamBubble = div;
    }
    wsStreamBubble.textContent += data.content;
    log.scrollTop = log.scrollHeight;
  } else if (data.type === 'ai_end') {
    const dots = document.getElementById('thinkingDots');
    if (dots) dots.remove();
    if (wsStreamBubble) {
      wsStreamBubble.classList.remove('streaming');
      wsStreamBubble.id = '';
      // 히스토리에 추가
      if (!wsMessages[wsTeamId]) wsMessages[wsTeamId] = [];
      wsMessages[wsTeamId].push({ type: 'bot', content: wsStreamBubble.textContent });
      wsStreamBubble = null;
    }
    wsStreaming = false;
    updateSendBtn();
  } else if (data.type === 'status') {
    // 상태 표시 (도구 사용 중 등)
    const dots = document.getElementById('thinkingDots');
    if (dots) dots.innerHTML = `<span style="font-size:10px;color:#58a6ff">${data.content}</span>`;
  } else if (data.type === 'ping') {
    // keepalive 응답
    if (wsConn) wsConn.send(JSON.stringify({ action: 'pong' }));
  } else if (data.type === 'history_cleared') {
    wsMessages[wsTeamId] = [];
    renderChatLog();
  }
}

function renderChatLog() {
  const log = document.getElementById('chatLog');
  const msgs = wsMessages[wsTeamId] || [];
  if (msgs.length === 0) {
    log.innerHTML = '<div style="text-align:center;color:#484f58;font-size:11px;padding:20px 0">🤖 매매봇에게 메시지를 보내보세요<br><span style="font-size:10px">예: "현재 봇 상태 알려줘"</span></div>';
    return;
  }
  log.innerHTML = msgs.map(m => {
    const cls = m.type === 'me' ? 'me' : 'bot';
    const cancelled = m.cancelled ? ' <span style="color:#f85149;font-size:10px">취소됨</span>' : '';
    return `<div class="bubble ${cls}">${_escapeHtml(m.content)}${cancelled}</div>`;
  }).join('');
  log.scrollTop = log.scrollHeight;
}

function _escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function updateSendBtn() {
  const btn = document.getElementById('chatSendBtn');
  if (wsStreaming) {
    btn.textContent = '■';
    btn.className = 'cancel';
    btn.onclick = cancelChat;
  } else {
    btn.textContent = '↑';
    btn.className = '';
    btn.onclick = sendChat;
  }
}

function quickCmd(prompt) {
  document.getElementById('chatMsg').value = prompt;
  sendChat();
}

function sendChat() {
  if (wsStreaming) return;
  if (!wsConn || wsConn.readyState !== 1) {
    showToast('연결 안 됨 — 재연결 중...', 'warn');
    connectWS();
    return;
  }
  const input = document.getElementById('chatMsg');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';

  // 로컬 즉시 표시
  if (!wsMessages[wsTeamId]) wsMessages[wsTeamId] = [];
  wsMessages[wsTeamId].push({ type: 'me', content: msg });
  renderChatLog();

  // WebSocket 전송
  wsConn.send(JSON.stringify({ prompt: msg }));
  input.focus();
}

function cancelChat() {
  if (wsConn && wsConn.readyState === 1) {
    wsConn.send(JSON.stringify({ action: 'cancel' }));
  }
  wsStreaming = false;
  wsStreamBubble = null;
  updateSendBtn();
  const dots = document.getElementById('thinkingDots');
  if (dots) dots.remove();
  const sb = document.getElementById('streamBubble');
  if (sb) { sb.classList.remove('streaming'); sb.id = ''; }
  showToast('작업 취소됨', 'info');
}

initChat();

// 버전 더블탭 → 페이지 강제 새로고침 (모바일+PC)
(function() {
  const el = document.getElementById('ver');
  let lastTap = 0;
  function doRefresh() {
    el.style.color = '#3fb950';
    el.style.background = '#3fb95022';
    el.textContent = '🔄 업데이트...';
    // 캐시 무시하고 페이지 자체를 새로 받아옴
    location.href = location.pathname + '?_=' + Date.now();
  }
  el.addEventListener('touchend', e => {
    const now = Date.now();
    if (now - lastTap < 400) { e.preventDefault(); doRefresh(); lastTap = 0; }
    else { lastTap = now; }
  });
  el.addEventListener('dblclick', doRefresh);
})();
</script>
